<!DOCTYPE html>
<html>
<head>
    <title>Student Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-4">

    <h1 class="text-center mb-4">Student Dashboard</h1>

    <!-- Search -->
    <form method="GET" class="mb-3">
        <input type="text" name="search" class="form-control" placeholder="Search student">
    </form>

    <a href="/add" class="btn btn-primary mb-3">Add Student</a>

    <!-- Table -->
    <table class="table table-bordered">
        <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Marks</th>
            <th>Grade</th>
            <th>Actions</th>
        </tr>

        {% for student in students %}
        <tr>
            <td>{{ student[0] }}</td>
            <td>{{ student[1] }}</td>
            <td>{{ student[2] }}</td>
            <td>
                <span class="badge bg-success">
                    {{ get_grade(student[2]) }}
                </span>
            </td>
            <td>
                <a href="/edit/{{ student[0] }}" class="btn btn-warning btn-sm">Edit</a>
                <a href="/delete/{{ student[0] }}" class="btn btn-danger btn-sm">Delete</a>
            </td>
        </tr>
        {% endfor %}
    </table>

    <!-- Stats -->
    <h5>Total Marks: {{ total }}</h5>
    <h5>Average Marks: {{ average }}</h5>

</div>

</body>
</html>
